services:
  - type: web
    name: balashte-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DB_SSL
        value: "true"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_PRODUCT_IMAGES_BUCKET
        value: product-images
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: FACTURAPI_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://balashte.netlify.app
